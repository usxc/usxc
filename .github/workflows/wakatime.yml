name: Waka Readme Stats

# This workflow is kept as a backup/template.
#
# Current status:
# - It does not run automatically because the schedule trigger is disabled.
# - It can be run manually from the Actions tab.
#
# To enable automatic daily updates again:
# 1. Uncomment the schedule block below.
# 2. Add the WakaTime section back to README.md:
#
#    <!--START_SECTION:waka-->
#    <!--END_SECTION:waka-->
#
# 3. Make sure these repository secrets are set:
#    - WAKATIME_API_KEY
#    - GH_TOKEN

on:
  # schedule:
  #   # Run at 19:30 UTC every day
  #   - cron: "30 19 * * *"

  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-readme:
    name: Update README with WakaTime metrics
    runs-on: ubuntu-latest

    steps:
      - uses: anmol098/waka-readme-stats@master
        with:
          WAKATIME_API_KEY: ${{ secrets.WAKATIME_API_KEY }}
          GH_TOKEN: ${{ secrets.GH_TOKEN }}

          # Show OS usage stats
          SHOW_OS: "False"

          # Show commit count stats
          SHOW_COMMIT: "False"

          # Show commits by day of week
          SHOW_DAYS_OF_WEEK: "False"

          # Show WakaTime language usage stats
          SHOW_LANGUAGE: "False"

          # Show editor usage stats
          SHOW_EDITORS: "False"

          # Show short profile info
          SHOW_SHORT_INFO: "False"

          # Show repository count by primary language
          SHOW_LANGUAGE_PER_REPO: "True"

          # Show total lines of code
          SHOW_LINES_OF_CODE: "False"

          # Show GitHub profile views
          SHOW_PROFILE_VIEWS: "False"

          # Show lines-of-code chart
          SHOW_LOC_CHART: "False"

          # Show WakaTime project stats
          SHOW_PROJECTS: "False"

          # Show timezone info
          SHOW_TIMEZONE: "False"

          # Show total coding time from WakaTime
          SHOW_TOTAL_CODE_TIME: "False"

          # Show last updated date
          SHOW_UPDATED_DATE: "False"

          # Commit message used when this workflow is manually run
          COMMIT_MESSAGE: "chore: update WakaTime stats [skip ci]"
