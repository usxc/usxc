name: Waka Readme Stats

on:
  schedule:
    # Run at 19:30 (UTC) every day
    - cron: "30 19 * * *"
  workflow_dispatch:

jobs:
  update-readme:
    name: Update README with Metrics
    runs-on: ubuntu-latest

    steps:
      - uses: anmol098/waka-readme-stats@master
        with:
          WAKATIME_API_KEY: ${{ secrets.WAKATIME_API_KEY }}
          GH_TOKEN: ${{ secrets.GH_TOKEN }}

          # OS 別の作業時間を表示するかどうか
          SHOW_OS: "False"

          # コミット数の統計を表示するかどうか
          SHOW_COMMIT: "False"

          # 曜日別のコミット統計を表示するかどうか
          SHOW_DAYS_OF_WEEK: "False"

          # WakaTime の言語別作業時間を表示するかどうか
          SHOW_LANGUAGE: "False"

          # 使用エディタの統計を表示するかどうか
          SHOW_EDITORS: "False"

          # 短いプロフィール情報を表示するかどうか
          SHOW_SHORT_INFO: "False"

          # GitHub リポジトリの主要言語ごとの repo 数を表示するかどうか
          SHOW_LANGUAGE_PER_REPO: "True"

          # 総コード行数を表示するかどうか
          SHOW_LINES_OF_CODE: "False"

          # GitHub プロフィール閲覧数を表示するかどうか
          SHOW_PROFILE_VIEWS: "False"

          # コード行数のグラフを表示するかどうか
          SHOW_LOC_CHART: "False"

          # WakaTime のプロジェクト別統計を表示するかどうか
          SHOW_PROJECTS: "False"

          # タイムゾーン情報を表示するかどうか
          SHOW_TIMEZONE: "False"

          # WakaTime の総コーディング時間を表示するかどうか
          SHOW_TOTAL_CODE_TIME: "False"

          # 最終更新日時を表示するかどうか
          SHOW_UPDATED_DATE: "True"
