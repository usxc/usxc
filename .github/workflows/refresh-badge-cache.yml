name: Refresh badge cache

on:
  schedule:
    # Run at 19:45 UTC every day
    - cron: "45 19 * * *"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: refresh-badge-cache-${{ github.ref }}
  cancel-in-progress: false

jobs:
  refresh:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v7

      - name: Update Qiita badge cache keys
        run: |
          python <<'PY'
          from datetime import datetime, timezone
          from pathlib import Path
          from urllib.parse import parse_qsl, urlencode, urlsplit, urlunsplit
          import re
          import sys

          README = Path("README.md")
          CACHE_PARAM = "v"

          text = README.read_text(encoding="utf-8")
          version = datetime.now(timezone.utc).strftime("%Y%m%d%H%M")

          # Update only Qiita badge URLs from badgen.org
          pattern = re.compile(
              r"https://badgen\.org/img/qiita/usxc/(?:contributions|articles)\?[^)\s\"']+"
          )

          def refresh_url(match: re.Match[str]) -> str:
              url = match.group(0)
              parts = urlsplit(url)

              query = [
                  (key, value)
                  for key, value in parse_qsl(parts.query, keep_blank_values=True)
                  if key != CACHE_PARAM
              ]
              query.append((CACHE_PARAM, version))

              return urlunsplit((
                  parts.scheme,
                  parts.netloc,
                  parts.path,
                  urlencode(query),
                  parts.fragment,
              ))

          updated_text = pattern.sub(refresh_url, text)

          if updated_text == text:
              print("No Qiita badge cache key changes.")
              sys.exit(0)

          README.write_text(updated_text, encoding="utf-8")
          print(f"Updated Qiita badge cache key to {version}.")
          PY

      - name: Commit and push changes
        run: |
          if git diff --quiet README.md; then
            echo "No changes to commit"
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add README.md
          git commit -m "chore: refresh badge cache [skip ci]"

          branch="${GITHUB_REF_NAME:-main}"

          for attempt in 1 2 3; do
            echo "Push attempt ${attempt}"

            if git pull --rebase origin "${branch}" && git push origin "HEAD:${branch}"; then
              echo "Pushed successfully"
              exit 0
            fi

            git rebase --abort || true
            sleep $((attempt * 5))
          done

          echo "Failed to push after retries"
          exit 1
